<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>العيادة الذكية | Smart Clinic</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f13; --surface: #1a1a22; --surface2: #22222e;
    --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.14);
    --accent: #6c63ff; --accent2: #a78bfa;
    --text: #f0eeff; --muted: #9490b0; --hint: #5a5678;
    --user-bubble: #2d2950; --bot-bubble: #1e1e2b;
    --success: #22d3a0; --radius: 14px; --radius-sm: 8px;
    --font: 'Cairo', sans-serif;
  }
  body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .chat-widget { width: 100%; max-width: 680px; height: 88vh; max-height: 760px; display: flex; flex-direction: column; background: var(--surface); border-radius: 20px; border: 1px solid var(--border2); overflow: hidden; box-shadow: 0 32px 80px rgba(0,0,0,0.6); animation: slideUp 0.4s cubic-bezier(0.16,1,0.3,1) both; }
  @keyframes slideUp { from { opacity:0; transform:translateY(24px); } to { opacity:1; transform:translateY(0); } }
  .header { padding: 18px 22px; background: var(--surface2); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 14px; flex-shrink: 0; }
  .header-icon { width:42px; height:42px; border-radius:12px; background: linear-gradient(135deg,var(--accent),var(--accent2)); display:flex; align-items:center; justify-content:center; font-size:20px; flex-shrink:0; }
  .header-info { flex:1; }
  .header-title { font-size:16px; font-weight:700; }
  .header-sub { font-size:12px; color:var(--muted); margin-top:2px; }
  .status-dot { width:8px; height:8px; border-radius:50%; background:var(--hint); transition:background 0.3s; flex-shrink:0; }
  .status-dot.active { background:var(--success); box-shadow:0 0 8px var(--success); }
  
  .suggested { display:flex; margin:16px 16px 0; gap:8px; flex-wrap:wrap; flex-shrink:0; }
  .chip { padding:6px 12px; border-radius:20px; background:var(--surface2); border:1px solid var(--border2); font-size:12px; font-family:var(--font); color:var(--muted); cursor:pointer; transition:all 0.2s; }
  .chip:hover { border-color:var(--accent); color:var(--accent2); background:rgba(108,99,255,0.08); }
  
  .chat-area { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:14px; scrollbar-width:thin; scrollbar-color:var(--border2) transparent; }
  .chat-area::-webkit-scrollbar { width:4px; }
  .chat-area::-webkit-scrollbar-thumb { background:var(--border2); border-radius:4px; }
  .msg { display:flex; flex-direction:column; gap:5px; max-width:82%; animation:msgIn 0.25s ease both; }
  @keyframes msgIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .msg.user { align-self:flex-start; align-items:flex-start; }
  .msg.bot  { align-self:flex-end;   align-items:flex-end; }
  .bubble { padding:12px 16px; border-radius:var(--radius); font-size:14px; line-height:1.75; word-break:break-word; }
  .msg.user .bubble { background:var(--user-bubble); border-bottom-right-radius:4px; border:1px solid rgba(108,99,255,0.2); }
  .msg.bot  .bubble { background:var(--bot-bubble);  border-bottom-left-radius:4px;  border:1px solid var(--border); }
  
  .typing { display:flex; gap:5px; padding:14px 16px; background:var(--bot-bubble); border-radius:var(--radius); border-bottom-left-radius:4px; border:1px solid var(--border); width:fit-content; }
  .typing span { width:7px; height:7px; border-radius:50%; background:var(--accent2); animation:bounce 1.2s infinite; }
  .typing span:nth-child(2){animation-delay:0.15s} .typing span:nth-child(3){animation-delay:0.3s}
  @keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-6px)}}
  
  .input-row { padding:12px 16px 16px; border-top:1px solid var(--border); display:flex; gap:8px; flex-shrink:0; }
  .input-wrap { flex:1; }
  .input-wrap input { width:100%; padding:11px 16px; border-radius:var(--radius-sm); background:var(--surface2); border:1px solid var(--border2); color:var(--text); font-family:var(--font); font-size:14px; outline:none; transition:border-color 0.2s; }
  .input-wrap input::placeholder { color:var(--hint); }
  .input-wrap input:focus { border-color:var(--accent); }
  .input-wrap input:disabled { opacity:0.4; cursor:not-allowed; }
  .send-btn { width:44px; height:44px; border-radius:var(--radius-sm); background:linear-gradient(135deg,var(--accent),var(--accent2)); border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:transform 0.15s,opacity 0.15s; font-size:18px; }
  .send-btn:hover{transform:scale(1.05)} .send-btn:active{transform:scale(0.96)}
  .send-btn:disabled{opacity:0.35;cursor:not-allowed;transform:none}
  @media(max-width:600px){body{padding:0;align-items:stretch}.chat-widget{border-radius:0;height:100vh;max-height:none}}
</style>
</head>
<body>
<div class="chat-widget">
  <div class="header">
    <div class="header-icon">🩺</div>
    <div class="header-info">
      <div class="header-title">المساعد الطبي الذكي</div>
      <div class="header-sub" id="header-sub">متصل بقاعدة البيانات (MongoDB) 🟢</div>
    </div>
    <div class="status-dot active" id="status-dot"></div>
  </div>

  <div class="suggested" id="suggested">
    <button class="chip" onclick="askSuggested('من هم الأطباء المتاحين؟')">من هم الأطباء المتاحين؟</button>
    <button class="chip" onclick="askSuggested('ما هي أسعار الكشف؟')">ما هي أسعار الكشف؟</button>
    <button class="chip" onclick="askSuggested('هل يوجد طبيب أسنان؟')">هل يوجد طبيب أسنان؟</button>
  </div>
  
  <div class="chat-area" id="chat-area">
    <div class="msg bot">
      <div class="bubble">مرحباً! 👋<br>أنا المساعد الذكي للعيادة، اسألني عن أي طبيب، تخصص، أو مواعيد الحجز وسأجيبك فوراً.</div>
    </div>
  </div>
  
  <div class="input-row">
    <div class="input-wrap">
      <input type="text" id="user-input" placeholder="اسأل عن أطباء العيادة..." 
             onkeydown="if(event.key==='Enter'){event.preventDefault();sendMsg();}">
    </div>
    <button class="send-btn" id="send-btn" onclick="sendMsg()">➤</button>
  </div>
</div>

<script>
// الاتصال بسيرفر البايثون (FastAPI) الخاص بك
const API_URL = 'http://127.0.0.1:8000/api/chat';
let isLoading = false, msgId = 0;

function askSuggested(question) {
    document.getElementById('user-input').value = question;
    sendMsg();
}

async function sendMsg() {
  if (isLoading) return;
  const inp = document.getElementById('user-input');
  const q = inp.value.trim(); 
  if (!q) return;
  
  inp.value = ''; 
  inp.disabled = true; 
  document.getElementById('send-btn').disabled = true;
  isLoading = true;
  
  addUser(q);
  const tid = addTyping();
  
  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question: q })
    });
    
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'حدث خطأ في الاتصال');
    
    removeEl(tid); 
    addBot(esc(data.reply).replace(/\n/g, '<br>'));
  } catch(err) {
    removeEl(tid); 
    addBot(`⚠️ <strong>خطأ:</strong> ${esc(err.message)} <br> تأكد من تشغيل سيرفر البايثون (uvicorn).`);
  }
  
  isLoading = false; 
  inp.disabled = false; 
  document.getElementById('send-btn').disabled = false; 
  inp.focus();
}

function addUser(t){app('<div class="msg user"><div class="bubble">'+esc(t)+'</div></div>');}
function addBot(h){const id='m'+(++msgId);app(`<div class="msg bot" id="${id}"><div class="bubble">${h}</div></div>`);return id;}
function addTyping(){const id='t'+(++msgId);app(`<div class="msg bot" id="${id}"><div class="typing"><span></span><span></span><span></span></div></div>`);return id;}
function removeEl(id){const e=document.getElementById(id);if(e)e.remove();}
function app(html){const a=document.getElementById('chat-area');a.insertAdjacentHTML('beforeend',html);a.scrollTop=a.scrollHeight;}
function esc(t){return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
</script>
</body>
</html>
